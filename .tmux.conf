# ============ 基础设置 ============
set -g prefix C-b
set -g mouse on

# ============ 插件列表 ============
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'xtheing/tmux-my-config'

# ============ 插件配置 ============
# continuum 自动保存恢复（每5分钟自动保存，开机自动恢复）
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'

# resurrect 详细配置
set -g @resurrect-capture-pane-contents 'on'      # 保存窗格滚动缓冲内容
set -g @resurrect-save-bash-history 'on'          # 保存 bash 历史
set -g @resurrect-strategy-vim 'session'          # 恢复 vim 会话（需 vim-obsession）
set -g @resurrect-strategy-nvim 'session'         # 恢复 nvim 会话（需 nvim-obsession）
set -g @resurrect-processes 'ssh psql mysql'      # 恢复特定进程

# 保存策略：continuum 每 5 分钟自动保存 + save-wrapper 残缺保存保护
# 不使用 hook 即时保存，避免 restore 期间保存-恢复死循环

# 安装插件管理器 TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# 初始化 tpm
run '~/.tmux/plugins/tpm/tpm'

# 覆盖 resurrect 的 save/restore 脚本路径，指向 user-maintained wrapper
# (必须在 tpm 之后、continuum sleep 1 醒来之前设置)
set -g @resurrect-save-script-path '~/.tmux/plugins/tmux-my-config/scripts/save-wrapper.sh'
set -g @resurrect-restore-script-path '~/.tmux/plugins/tmux-my-config/scripts/restore-wrapper.sh'

# 加载自定义配置（必须放在 tpm 之后，覆盖 sensible 的设置）
run '~/.tmux/plugins/tmux-my-config/my-tmux.tmux'

